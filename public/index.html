<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sparkle">
    <title>Sparkle Messenger</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    
    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <div class="container" id="app">

        <!-- LOGIN VIEW -->
        <div id="login-view">
            <img src="welcome1.jpg" alt="Welcome" class="welcome-img">
            <h1 class="sparkle-title">Welcome to Sparkle</h1>
            <div class="input-group">
                <div class="code-input-wrapper">
                    <span class="plus-sign">+</span>
                    <input type="text" id="countryCode" placeholder="7" maxlength="4">
                </div>
                <input type="tel" id="phone" placeholder="Phone Number" maxlength="12">
            </div>
            <div id="countryInfo"></div>
            <button class="signup-btn" onclick="validateAndProceed()">Sign Up</button>
        </div>

        <!-- VERIFY VIEW -->
        <div id="verify-view" style="display: none;">
            <img src="welcome1.jpg" alt="Verification" class="welcome-img">
            <h1>Verification</h1>
            <p id="phone-info"></p>
            <div class="code-group">
                <input type="number" class="code-digit" maxlength="1" oninput="handleCodeInput(this)">
                <input type="number" class="code-digit" maxlength="1" oninput="handleCodeInput(this)">
                <input type="number" class="code-digit" maxlength="1" oninput="handleCodeInput(this)">
                <input type="number" class="code-digit" maxlength="1" oninput="handleCodeInput(this)">
                <input type="number" class="code-digit" maxlength="1" oninput="handleCodeInput(this)">
            </div>
        </div>

        <!-- CHAT & PROFILE VIEWS -->
        <div id="chat-view" style="display: none; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <span class="header-logo">Sparkle</span>
                <input type="text" id="input-search" placeholder="Search user by sparkle-id">
            </div>
            <div class="chat-body">
                <p class="empty-msg">No messages here yet...</p>
            </div>
            <div class="chat-navigation ios-nav">
                <button class="nav-btn" onclick="openChats()"><img src="chats.png" alt="Chats"></button>
                <button class="nav-btn" onclick="openProfile()"><img src="profile.webp" alt="Profile"></button>
            </div>
        </div>

        <div id="profile-view" style="display: none; flex-direction: column; height: 100%;">
            <div class="profile-content">
                <img src="placeholder.webp" alt="Avatar" class="profile-avatar-main">
                <div class="profile-info-center">
                    <div class="username-display-wrapper">
                        <span id="user-display-name" style="font-weight: bold; font-size: 1.2em;"></span>
                        <button class="edit-username-btn" onclick="showUsernameModal()">
                            <img src="edit.webp" alt="Edit" style="width: 20px; height: 20px;">
                        </button>
                    </div>
                    <span id="user-display-id" style="margin-top: 5px; color: #555;">ID: 0000</span>
                    <span id="user-phone-display" style="margin-top: 5px; color: #888;"></span>
                </div>
            </div>
            <div class="chat-navigation ios-nav">
                <button class="nav-btn" onclick="openChats()"><img src="chats.png" alt="Chats"></button>
                <button class="nav-btn" onclick="openProfile()"><img src="profile.webp" alt="Profile"></button>
            </div>
        </div>

    </div>

    <!-- FULL SCREEN USERNAME MODAL -->
    <div id="username-modal" class="username-modal" style="display: none;">
        <div class="modal-header">
            <button onclick="closeUsernameModal()" class="modal-btn cancel">Cancel</button>
            <button onclick="saveNewUsername()" class="modal-btn save">Save</button>
        </div>
        <div class="modal-body">
            <h2>Change Username</h2>
            <input type="text" id="modal-username-input" maxlength="11" placeholder="New username">
            
            <div class="username-hints">
                <p>Only English letters, numbers and <strong>_ . - /</strong> are allowed</p>
                <p class="profile-link">Your profile link will be: <strong>sp.me/@<span id="preview-username">yourname</span></strong></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
